        weight = 20
      [[languages.en.menu.main]]
        identifier = "blog"
        name = "lab"
        url = "/blog"
        weight = 25
      [[languages.en.menu.main]]
        identifier = "about"
        name = "about me"
        url = "/about"
        weight = 50
      [[languages.en.menu.main]]
        identifier = "tags"
        name = "tags"
        url = "/tags"
        weight = 60
      [[languages.en.menu.main]]
        identifier = "categories"
        name = "categories"
        url = "/categories"
        weight = 70

  [languages.fr]
    label = "FR"
    languageName = "Français"
    title = "ctfint"
    weight = 2
