{{/* Theme picker — same .menu chrome as language-menu.
     Dropdown items are color swatches (circles filled with each theme's
     accent), not text labels. Tooltip = theme name. */}}
<ul class="menu menu--desktop menu--theme-selector">
  <li class="menu__trigger" id="theme-trigger">green&nbsp;▾</li>
  <li>
    <ul class="menu__dropdown menu__dropdown--swatches">
      <li><a href="#" data-theme="green" title="green (phosphor CRT)" aria-label="green theme"><span class="theme-swatch theme-swatch--green"></span></a></li>
      <li><a href="#" data-theme="orange" title="orange (amber CRT)" aria-label="orange theme"><span class="theme-swatch theme-swatch--orange"></span></a></li>
      <li><a href="#" data-theme="cyberpunk" title="cyberpunk (magenta)" aria-label="cyberpunk theme"><span class="theme-swatch theme-swatch--cyberpunk"></span></a></li>
    </ul>
  </li>
</ul>
<script>
  (function () {
    var KEY = 'ctfint-theme';
    var trigger = document.getElementById('theme-trigger');
    var saved = null;
    try { saved = localStorage.getItem(KEY); } catch (e) {}
    var current = saved || 'green';
    function setTrigger(t) {
      if (trigger) trigger.innerHTML = t + '&nbsp;▾';
    }
    setTrigger(current);
    document.querySelectorAll('.menu--theme-selector a[data-theme]').forEach(function (a) {
      a.addEventListener('click', function (e) {
        e.preventDefault();
        var t = a.dataset.theme;
        document.documentElement.setAttribute('data-theme', t);
        try { localStorage.setItem(KEY, t); } catch (e) {}
        setTrigger(t);
      });
    });
  })();
</script>
