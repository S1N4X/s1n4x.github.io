{{/* Theme picker — three color circles, always visible, no dropdown.
     Sits beside language picker in the header. Active swatch highlighted
     via aria-pressed (CSS shows a ring around it). */}}
<div class="theme-picker-inline" role="radiogroup" aria-label="color theme">
  <button class="theme-swatch theme-swatch--green"     data-theme="green"     aria-pressed="true"  aria-label="green theme (phosphor CRT)"  title="green"></button>
  <button class="theme-swatch theme-swatch--orange"    data-theme="orange"    aria-pressed="false" aria-label="orange theme (amber CRT)"    title="orange"></button>
  <button class="theme-swatch theme-swatch--cyberpunk" data-theme="cyberpunk" aria-pressed="false" aria-label="cyberpunk theme (magenta)"   title="cyberpunk"></button>
</div>
<script>
  (function () {
    var KEY = 'ctfint-theme';
    var saved = null;
    try { saved = localStorage.getItem(KEY); } catch (e) {}
    var current = saved || 'green';
    var btns = document.querySelectorAll('.theme-picker-inline .theme-swatch');
    function applyActive(t) {
      btns.forEach(function (b) {
        b.setAttribute('aria-pressed', b.dataset.theme === t ? 'true' : 'false');
      });
    }
    applyActive(current);
    btns.forEach(function (b) {
      b.addEventListener('click', function () {
        var t = b.dataset.theme;
        document.documentElement.setAttribute('data-theme', t);
        try { localStorage.setItem(KEY, t); } catch (e) {}
        applyActive(t);
      });
    });
  })();
</script>
