{{/* Apply saved theme in <head> before page renders, to prevent
     flash-of-default-theme. Footer's full picker handles persistence
     + click events; this is just the early restore. */}}
<script>
  (function () {
    try {
      var t = localStorage.getItem('ctfint-theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
  })();
</script>
